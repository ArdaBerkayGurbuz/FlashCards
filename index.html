<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <title>FlashCards — Bilgi Kartları</title>
  <meta name="description" content="Kağıt hissi veren, çevrimdışı çalışan bilgi kartı uygulaması." />

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#160F2B" />

  <!-- iOS ana ekran -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FlashCards" />
  <link rel="apple-touch-icon" href="./icons/flashcards_icons/ios/apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="./icons/flashcards_icons/ios/icon-152.png" />
  <link rel="apple-touch-icon" sizes="167x167" href="./icons/flashcards_icons/ios/icon-167.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="./icons/flashcards_icons/ios/icon-180.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/flashcards_icons/pwa/icon-192.png" />

  <!-- Fontlar -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="root">
    <div class="boot">Yükleniyor…</div>
  </div>

  <!-- React (CDN, UMD — build adımı yok) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <script src="./app.js"></script>

  <script>
    // Service worker kaydı (göreli yol — GitHub Pages alt-dizin uyumlu)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js').catch(function (e) {
          console.warn('SW kaydı başarısız:', e);
        });
      });
    }
  </script>
</body>
</html>
